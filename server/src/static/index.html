<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
        header { background: #16213e; padding: 1rem; border-bottom: 2px solid #0f3460; }
        header h1 { color: #4ecca3; font-size: 1.5rem; }
        nav { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        nav button { background: #0f3460; color: #eee; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        nav button:hover, nav button.active { background: #4ecca3; color: #1a1a2e; }
        .card { background: #16213e; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; border-left: 3px solid #4ecca3; }
        .card h3 { color: #4ecca3; margin-bottom: 0.5rem; }
        .card .meta { color: #888; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .card .meta span { margin-right: 1rem; }
        .recipe-detail { background: #16213e; border-radius: 8px; padding: 1.5rem; margin: 1rem 0; }
        .recipe-detail h2 { color: #4ecca3; margin-bottom: 0.5rem; }
        .recipe-detail .description { color: #aaa; margin-bottom: 1rem; }
        .recipe-detail .meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .recipe-detail .meta span { background: #0f3460; padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.85rem; }
        .ingredients { margin: 1rem 0; }
        .ingredients h3 { color: #e94560; margin-bottom: 0.5rem; }
        .ingredients ul { list-style: none; }
        .ingredients li { padding: 0.25rem 0; border-bottom: 1px solid #0f3460; }
        .ingredients li::before { content: "• "; color: #4ecca3; }
        .steps { margin: 1rem 0; }
        .steps h3 { color: #e94560; margin-bottom: 0.5rem; }
        .steps ol { padding-left: 1.5rem; }
        .steps li { padding: 0.5rem 0; line-height: 1.6; }
        .steps .timer { color: #4ecca3; font-size: 0.85rem; }
        .search { display: flex; gap: 0.5rem; margin: 1rem 0; }
        .search input { flex: 1; background: #0f3460; border: 1px solid #4ecca3; color: #eee; padding: 0.5rem 1rem; border-radius: 4px; font-size: 1rem; }
        .search input:focus { outline: none; border-color: #4ecca3; box-shadow: 0 0 5px #4ecca3; }
        .search button { background: #4ecca3; color: #1a1a2e; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .empty { text-align: center; padding: 3rem; color: #666; }
        .empty p { margin-bottom: 1rem; }
        .empty button { background: #4ecca3; color: #1a1a2e; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; }
        .back-btn { background: #0f3460; color: #eee; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-bottom: 1rem; }
        .back-btn:hover { background: #4ecca3; color: #1a1a2e; }
        .tag { display: inline-block; background: #e94560; color: #fff; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.75rem; margin-right: 0.25rem; }
        select { background: #0f3460; color: #eee; border: 1px solid #4ecca3; border-radius: 4px; padding: 0.25rem; font-size: 0.8rem; max-width: 100%; }
        footer { text-align: center; padding: 1rem; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>
<header>
    <div class="container">
        <h1>Recipes</h1>
        <nav>
            <button onclick="showView('recipes')" id="nav-recipes" class="active">Recipes</button>
            <button onclick="showView('import')" id="nav-import">Import</button>
            <button onclick="showView('mealplan')" id="nav-mealplan">Meal Plan</button>
            <button onclick="showView('shopping')" id="nav-shopping">Shopping</button>
        </nav>
    </div>
</header>

<div class="container">
    <div id="view-recipes">
        <div class="search">
            <input type="text" id="search-input" placeholder="Search recipes..." onkeyup="if(event.key==='Enter')searchRecipes()">
            <select id="tag-filter" onchange="filterByTag()"><option value="">All tags</option></select>
            <button onclick="searchRecipes()">Search</button>
        </div>
        <div id="recipe-list"></div>
    </div>

    <div id="view-import" style="display:none">
        <div class="card">
            <h3>Import Recipe from URL</h3>
            <div class="search" style="margin-top:0.5rem">
                <input type="text" id="import-url" placeholder="https://www.allrecipes.com/recipe/...">
                <button onclick="importRecipe()">Import</button>
            </div>
            <p id="import-status" style="margin-top:0.5rem;color:#888;font-size:0.85rem"></p>
        </div>
    </div>

    <div id="view-detail" style="display:none">
        <button class="back-btn" onclick="showView('recipes')">← Back to recipes</button>
        <div id="recipe-detail"></div>
    </div>

    <div id="view-mealplan" style="display:none">
        <div class="card">
            <h3>Weekly Meal Plan</h3>
            <div class="meta" style="margin:0.5rem 0">
                <button class="back-btn" onclick="shiftWeek(-1)">← Prev week</button>
                <span id="meal-week-label" style="margin:0 1rem"></span>
                <button class="back-btn" onclick="shiftWeek(1)">Next week →</button>
            </div>
            <div id="meal-plan-grid"></div>
            <button onclick="generateShoppingFromPlan()">Generate shopping list from this week</button>
            <p id="mealplan-status" style="margin-top:0.5rem;color:#888;font-size:0.85rem"></p>
        </div>
    </div>

    <div id="view-shopping" style="display:none">
        <div class="card">
            <h3>Shopping List</h3>
            <div class="search" style="margin-top:0.5rem">
                <input type="text" id="shopping-item" placeholder="Add item...">
                <button onclick="addShoppingItem()">Add</button>
            </div>
            <button class="back-btn" style="margin-top:0.5rem" onclick="clearCheckedShopping()">Clear checked</button>
            <div id="shopping-list" style="margin-top:1rem"></div>
        </div>
    </div>
</div>

<footer></footer>

<script>
const API = '/api';
let mealWeekStart = mondayOf(new Date());
let allRecipes = [];

async function loadAllRecipes() {
    const res = await fetch(API + '/recipes');
    allRecipes = await res.json();
}

async function loadTagFilter() {
    try {
        const res = await fetch(API + '/tags');
        const tags = await res.json();
        const select = document.getElementById('tag-filter');
        select.innerHTML = '<option value="">All tags</option>' +
            tags.map(t => '<option value="' + escapeHtml(t.name) + '">#' + escapeHtml(t.name) + '</option>').join('');
    } catch (e) { /* ignore */ }
}

function filterByTag() {
    const tag = document.getElementById('tag-filter').value;
    if (tag) loadRecipesByTag(tag);
    else loadRecipes();
}

async function loadRecipesByTag(tag) {
    const res = await fetch(API + '/recipes?tag=' + encodeURIComponent(tag));
    const recipes = await res.json();
    renderRecipeList(recipes);
}

function mondayOf(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0,0,0,0);
    return d;
}

function formatDate(d) {
    return d.toISOString().slice(0, 10);
}

function shiftWeek(delta) {
    mealWeekStart.setDate(mealWeekStart.getDate() + delta * 7);
    loadMealPlan();
}

function showView(view) {
    document.querySelectorAll('[id^="view-"]').forEach(el => el.style.display = 'none');
    document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + view).style.display = 'block';
    const navBtn = document.getElementById('nav-' + view);
    if (navBtn) navBtn.classList.add('active');
    if (view === 'recipes') { loadTagFilter(); loadRecipes(); }
    if (view === 'mealplan') { loadAllRecipes().then(loadMealPlan); }
    if (view === 'shopping') loadShopping();
}

async function loadRecipes() {
    try {
        const res = await fetch(API + '/recipes');
        const recipes = await res.json();
        renderRecipeList(recipes);
    } catch (e) {
        document.getElementById('recipe-list').innerHTML = '<div class="empty"><p>Error loading recipes. Is the server running?</p></div>';
    }
}

function renderRecipeList(recipes) {
        const container = document.getElementById('recipe-list');

        if (recipes.length === 0) {
            container.innerHTML = '<div class="empty"><p>No recipes yet</p><button onclick="showView(\'import\')">Import your first recipe</button></div>';
            return;
        }

        container.innerHTML = recipes.map(r => {
            const time = r.total_time_minutes ? r.total_time_minutes + ' min' : '?';
            const rating = r.rating ? '★'.repeat(r.rating) : '';
            return '<div class="card" onclick="showRecipe(\'' + r.id + '\')" style="cursor:pointer">' +
                '<h3>' + escapeHtml(r.name) + '</h3>' +
                '<div class="meta">' +
                '<span>⏱ ' + time + '</span>' +
                '<span>🍽 ' + r.servings + ' servings</span>' +
                (rating ? '<span>' + rating + '</span>' : '') +
                '</div>' +
                (r.description ? '<p style="color:#aaa;font-size:0.9rem">' + escapeHtml(r.description).substring(0, 100) + '...</p>' : '') +
                '</div>';
        }).join('');
}

async function searchRecipes() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) { loadRecipes(); return; }

    try {
        const res = await fetch(API + '/recipes/search?q=' + encodeURIComponent(query));
        const recipes = await res.json();
        const container = document.getElementById('recipe-list');

        if (recipes.length === 0) {
            container.innerHTML = '<div class="empty"><p>No recipes found for "' + escapeHtml(query) + '"</p></div>';
            return;
        }

        container.innerHTML = recipes.map(r => {
            const time = r.total_time_minutes ? r.total_time_minutes + ' min' : '?';
            return '<div class="card" onclick="showRecipe(\'' + r.id + '\')" style="cursor:pointer">' +
                '<h3>' + escapeHtml(r.name) + '</h3>' +
                '<div class="meta"><span>⏱ ' + time + '</span></div></div>';
        }).join('');
    } catch (e) {
        console.error(e);
    }
}

async function showRecipe(id) {
    showView('detail');
    try {
        const [recipeRes, ingredientsRes, stepsRes, tagsRes] = await Promise.all([
            fetch(API + '/recipes/' + id),
            fetch(API + '/recipes/' + id + '/ingredients'),
            fetch(API + '/recipes/' + id + '/steps'),
            fetch(API + '/recipes/' + id + '/tags'),
        ]);

        const recipe = await recipeRes.json();
        const ingredients = await ingredientsRes.json();
        const steps = await stepsRes.json();
        const tags = await tagsRes.json();

        let meta = [];
        if (recipe.total_time_minutes) meta.push('⏱ ' + recipe.total_time_minutes + ' min');
        meta.push('🍽 ' + recipe.servings + ' servings');
        if (recipe.difficulty) meta.push('📊 ' + recipe.difficulty);
        if (recipe.rating) meta.push('⭐ ' + '★'.repeat(recipe.rating));

        let html = '<div class="recipe-detail">' +
            '<h2>' + escapeHtml(recipe.name) + '</h2>' +
            (recipe.description ? '<p class="description">' + escapeHtml(recipe.description) + '</p>' : '') +
            '<div class="meta">' + meta.map(m => '<span>' + m + '</span>').join('') + '</div>';

        if (tags.length > 0) {
            html += '<p style="margin:0.5rem 0">' + tags.map(t => '<span class="tag">#' + escapeHtml(t.name) + '</span>').join('') + '</p>';
        }
        html += '<div class="search" style="margin:0.5rem 0"><input type="text" id="new-tag" placeholder="Add tag..."><button onclick="addTag(\'' + id + '\')">Add tag</button></div>';

        if (ingredients.length > 0) {
            html += '<div class="ingredients"><h3>Ingredients</h3><ul>' +
                ingredients.map(i => '<li>' + escapeHtml(i.display) + '</li>').join('') +
                '</ul></div>';
        }

        if (steps.length > 0) {
            html += '<div class="steps"><h3>Steps</h3><ol>' +
                steps.map(s => {
                    let stepHtml = '<li>' + escapeHtml(s.instruction);
                    if (s.timer_seconds) {
                        const min = Math.floor(s.timer_seconds / 60);
                        const sec = s.timer_seconds % 60;
                        stepHtml += ' <span class="timer">[⏱ ' + min + ':' + String(sec).padStart(2, '0') + ']</span>';
                    }
                    stepHtml += '</li>';
                    return stepHtml;
                }).join('') +
                '</ol></div>';
        }

        html += '</div>';
        document.getElementById('recipe-detail').innerHTML = html;
    } catch (e) {
        document.getElementById('recipe-detail').innerHTML = '<div class="empty"><p>Error loading recipe</p></div>';
    }
}

async function importRecipe() {
    const url = document.getElementById('import-url').value.trim();
    if (!url) return;

    const status = document.getElementById('import-status');
    status.textContent = 'Fetching and parsing...';
    status.style.color = '#e94560';

    try {
        const res = await fetch(API + '/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });

        if (!res.ok) {
            const err = await res.text();
            status.textContent = 'Error: ' + err;
            status.style.color = '#e94560';
            return;
        }

        const recipe = await res.json();
        status.textContent = 'Imported: ' + recipe.name;
        status.style.color = '#4ecca3';
        document.getElementById('import-url').value = '';
        setTimeout(() => showView('recipes'), 1500);
    } catch (e) {
        status.textContent = 'Error: ' + e.message;
        status.style.color = '#e94560';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadMealPlan() {
    if (allRecipes.length === 0) await loadAllRecipes();
    const weekEnd = new Date(mealWeekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    document.getElementById('meal-week-label').textContent =
        formatDate(mealWeekStart) + ' — ' + formatDate(weekEnd);

    try {
        const res = await fetch(API + '/meal-plans?week_start=' + formatDate(mealWeekStart));
        const meals = await res.json();
        const byKey = {};
        meals.forEach(m => { byKey[m.date + ':' + m.meal_type] = m; });

        const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
        const types = ['breakfast','lunch','dinner','snack'];
        let html = '<table style="width:100%;border-collapse:collapse;font-size:0.9rem">';
        html += '<tr><th style="text-align:left;padding:0.25rem">Day</th>';
        types.forEach(t => html += '<th style="text-align:left;padding:0.25rem">' + t + '</th>');
        html += '</tr>';

        for (let i = 0; i < 7; i++) {
            const d = new Date(mealWeekStart);
            d.setDate(d.getDate() + i);
            const dateStr = formatDate(d);
            html += '<tr><td style="padding:0.25rem;color:#4ecca3">' + days[i] + ' ' + d.getDate() + '</td>';
            types.forEach(t => {
                const meal = byKey[dateStr + ':' + t];
                const selected = meal && meal.recipe_id ? meal.recipe_id : '';
                html += '<td style="padding:0.25rem;border-top:1px solid #0f3460">';
                html += '<select onchange="assignMeal(\'' + dateStr + '\',\'' + t + '\', this.value)">';
                html += '<option value="">—</option>';
                allRecipes.forEach(r => {
                    html += '<option value="' + r.id + '"' + (r.id === selected ? ' selected' : '') + '>' + escapeHtml(r.name) + '</option>';
                });
                html += '</select></td>';
            });
            html += '</tr>';
        }
        html += '</table>';
        document.getElementById('meal-plan-grid').innerHTML = html;
    } catch (e) {
        document.getElementById('meal-plan-grid').innerHTML = '<p class="empty">Error loading meal plan</p>';
    }
}

async function assignMeal(date, mealType, recipeId) {
    if (!recipeId) {
        await fetch(API + '/meal-plans/clear', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date, meal_type: mealType })
        });
    } else {
        await fetch(API + '/meal-plans', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date, meal_type: mealType, recipe_id: recipeId })
        });
    }
    loadMealPlan();
}

async function addTag(recipeId) {
    const input = document.getElementById('new-tag');
    const name = input.value.trim();
    if (!name) return;
    await fetch(API + '/recipes/' + recipeId + '/tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    });
    showRecipe(recipeId);
}

async function generateShoppingFromPlan() {
    const status = document.getElementById('mealplan-status');
    status.textContent = 'Generating...';
    try {
        const res = await fetch(API + '/meal-plans/generate-shopping', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ week_start: formatDate(mealWeekStart) })
        });
        const data = await res.json();
        status.textContent = 'Added ' + data.added + ' items to shopping list';
        status.style.color = '#4ecca3';
    } catch (e) {
        status.textContent = 'Error generating list';
        status.style.color = '#e94560';
    }
}

async function loadShopping() {
    try {
        const res = await fetch(API + '/shopping');
        const items = await res.json();
        const container = document.getElementById('shopping-list');
        if (items.length === 0) {
            container.innerHTML = '<p style="color:#666">No items yet</p>';
            return;
        }
        container.innerHTML = items.map(i => {
            const checked = i.checked ? 'checked' : '';
            const style = i.checked ? 'text-decoration:line-through;color:#666' : '';
            const label = [i.quantity, i.unit, i.item].filter(Boolean).join(' ');
            return '<label style="display:block;padding:0.35rem 0;border-bottom:1px solid #0f3460;' + style + '">' +
                '<input type="checkbox" ' + checked + ' onchange="toggleShopping(\'' + i.id + '\')"> ' +
                escapeHtml(label) +
                (i.category ? ' <span style="color:#888;font-size:0.8rem">(' + escapeHtml(i.category) + ')</span>' : '') +
                '</label>';
        }).join('');
    } catch (e) {
        document.getElementById('shopping-list').innerHTML = '<p>Error loading shopping list</p>';
    }
}

async function addShoppingItem() {
    const input = document.getElementById('shopping-item');
    const item = input.value.trim();
    if (!item) return;
    await fetch(API + '/shopping', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item })
    });
    input.value = '';
    loadShopping();
}

async function toggleShopping(id) {
    await fetch(API + '/shopping/' + id + '/toggle', { method: 'POST' });
    loadShopping();
}

async function clearCheckedShopping() {
    await fetch(API + '/shopping/clear-checked', { method: 'POST' });
    loadShopping();
}

loadTagFilter();
loadRecipes();
</script>
</body>
</html>
